<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mesa de Ayuda IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===================================================
   Design System: ADN Visual — Glassmorphism / iOS
   =================================================== */
:root {
  --primary-accent:   #6366f1;
  --primary-light:    #818cf8;
  --primary-dark:     #4338ca;

  --bg-gradient:      linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #ede9fe 100%);
  --glass-bg:         rgba(255, 255, 255, 0.72);
  --glass-header:     rgba(255, 255, 255, 0.85);
  --glass-footer:     rgba(255, 255, 255, 0.60);
  --glass-border:     rgba(255, 255, 255, 0.45);
  --glass-input-bg:   rgba(255, 255, 255, 0.55);

  --text-main:        #1e293b;
  --text-muted:       #64748b;
  --text-white:       #ffffff;

  --bubble-bot-bg:    rgba(255, 255, 255, 0.92);
  --bubble-user-bg:   var(--primary-accent);
  --bubble-user-text: #ffffff;

  --shadow-soft:      0 8px 32px rgba(99, 102, 241, 0.18);
  --shadow-btn:       0 4px 14px rgba(99, 102, 241, 0.35);
  --shadow-input:     0 2px 8px rgba(99, 102, 241, 0.10);

  --radius-xl:        24px;
  --radius-lg:        16px;
  --radius-md:        12px;
  --radius-sm:        8px;
  --radius-bubble:    20px;

  /* Espaciado — escala en desktop */
  --spacing-xs:       6px;
  --spacing-sm:       10px;
  --spacing-md:       18px;
  --spacing-lg:       26px;

  --font-main:        'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:        'Space Mono', monospace;

  /* Ancho máximo del área de chat en desktop */
  --chat-max:         760px;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== BODY ===== */
body {
  font-family: var(--font-main);
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-main);
  height: 100vh;
  height: 100dvh;           /* dynamic viewport height — clave en móvil */
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Orbes de fondo */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.25;
  z-index: 0;
  pointer-events: none;
}
body::before {
  width: 340px; height: 340px;
  background: var(--primary-accent);
  animation: orbMove 12s ease-in-out infinite alternate;
}
body::after {
  width: 260px; height: 260px;
  background: #a5b4fc;
  animation: orbMove 16s ease-in-out infinite alternate-reverse;
}
@keyframes orbMove {
  from { top: 5%;  left: 5%; }
  to   { top: 65%; left: 55%; }
}

/* ===== HEADER ===== */
header {
  position: relative;
  z-index: 10;
  background: var(--glass-header);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--glass-border);
  padding: var(--spacing-sm) var(--spacing-md);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--spacing-sm);
  box-shadow: 0 2px 16px rgba(99, 102, 241, 0.10);
  animation: slideDown 0.5s ease-out both;
  /* safe-area para notch / isla dinámica */
  padding-top: max(var(--spacing-sm), env(safe-area-inset-top));
  padding-left: max(var(--spacing-md), env(safe-area-inset-left));
  padding-right: max(var(--spacing-md), env(safe-area-inset-right));
}

header h1 {
  font-size: clamp(0.95rem, 3vw, 1.25rem);
  font-weight: 700;
  color: var(--primary-accent);
  letter-spacing: -0.3px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* API config — se contrae en pantallas muy pequeñas */
.api-config {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  background: var(--glass-input-bg);
  padding: 5px 7px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-input);
  min-width: 0;             /* permite que flex comprima */
}

.api-config input[type="password"] {
  border: none;
  background: transparent;
  outline: none;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-main);
  padding: 4px 5px;
  /* fluido: 100 px en móvil, 140 px en desktop */
  width: clamp(90px, 22vw, 140px);
  min-width: 0;
}
.api-config input::placeholder { color: var(--text-muted); }

.api-config button, .btn-primary {
  background: var(--primary-accent);
  color: var(--text-white);
  border: none;
  padding: 6px 12px;
  border-radius: var(--radius-md);
  font-family: var(--font-main);
  font-size: clamp(0.75rem, 2vw, 0.85rem);
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  box-shadow: var(--shadow-btn);
  flex-shrink: 0;
}
.api-config button:hover, .btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
}
.api-config button.connected {
  background: #16a34a;
  cursor: default;
  box-shadow: 0 4px 14px rgba(22, 163, 74, 0.35);
}
.api-config button.connected:hover { background: #16a34a; transform: none; }

/* ===== MAIN / CHAT ===== */
main {
  position: relative;
  z-index: 5;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  /* centra el flujo en desktop, llena en móvil */
  padding: var(--spacing-md) max(var(--spacing-md), calc((100% - var(--chat-max)) / 2));
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
main::-webkit-scrollbar { width: 5px; }
main::-webkit-scrollbar-track { background: transparent; }
main::-webkit-scrollbar-thumb {
  background: rgba(99, 102, 241, 0.25);
  border-radius: 10px;
}

/* ===== BURBUJAS ===== */
.msg {
  /* más ancho en móvil (espacio escaso), más estrecho en desktop */
  max-width: min(85%, 580px);
  padding: 11px 16px;
  border-radius: var(--radius-bubble);
  font-size: clamp(0.85rem, 2.2vw, 0.93rem);
  line-height: 1.55;
  border: 1px solid var(--glass-border);
  animation: bubbleIn 0.35s ease-out both;
  word-break: break-word;   /* evita desbordamiento con URLs largas */
}
.bot {
  align-self: flex-start;
  background: var(--bubble-bot-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom-left-radius: 4px;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.10);
}
.user {
  align-self: flex-end;
  background: var(--bubble-user-bg);
  color: var(--bubble-user-text);
  border: none;
  border-bottom-right-radius: 4px;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.30);
}
.bot strong { color: var(--primary-accent); font-weight: 600; }
.user strong { color: rgba(255,255,255,0.85); font-weight: 600; }

/* Indicador de escritura */
.typing-indicator {
  align-self: flex-start;
  display: none;
  align-items: center;
  gap: 5px;
  padding: 11px 16px;
  border-radius: var(--radius-bubble);
  border-bottom-left-radius: 4px;
  background: var(--bubble-bot-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.10);
}
.typing-indicator.visible { display: flex; }
.typing-dot {
  width: 7px; height: 7px;
  background: var(--primary-accent);
  border-radius: 50%;
  animation: bounce 1.2s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
  40%           { transform: translateY(-6px); opacity: 1;   }
}

/* ===== FOOTER ===== */
footer {
  position: relative;
  z-index: 10;
  background: var(--glass-footer);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid var(--glass-border);
  /* mismo padding lateral centrado que el main */
  padding: var(--spacing-sm) max(var(--spacing-md), calc((100% - var(--chat-max)) / 2));
  padding-bottom: max(var(--spacing-sm), env(safe-area-inset-bottom));
  display: flex;
  gap: var(--spacing-sm);
  align-items: flex-end;
  box-shadow: 0 -2px 16px rgba(99, 102, 241, 0.08);
}

footer textarea {
  flex: 1;
  min-height: 44px;
  max-height: 120px;
  padding: 10px 14px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  background: rgba(255, 255, 255, 0.75);
  font-family: var(--font-main);
  font-size: clamp(0.88rem, 2.2vw, 0.92rem);
  color: var(--text-main);
  resize: none;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  box-shadow: var(--shadow-input);
  /* Evita zoom automático en iOS (mínimo 16 px efectivos) */
  font-size: max(16px, clamp(0.88rem, 2.2vw, 0.92rem));
}
footer textarea:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}
footer textarea::placeholder { color: var(--text-muted); }

/* Botón enviar — tamaño táctil mínimo 44 × 44 px */
footer button {
  min-width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--primary-accent);
  border: none; border-radius: 50%;
  cursor: pointer;
  box-shadow: var(--shadow-btn);
  transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  flex-shrink: 0;
  touch-action: manipulation; /* elimina delay de 300 ms en móvil */
}
footer button svg { fill: white; width: 20px; height: 20px; transform: translateX(1px); }
footer button:hover {
  background: var(--primary-dark);
  transform: scale(1.08) translateY(-1px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
}
footer button:active { transform: scale(0.95); }

/* ===== ANIMACIONES ===== */
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)  scale(1); }
}

/* ===== BREAKPOINTS ===== */

/* Tablet / desktop pequeño ≥ 600 px */
@media (min-width: 600px) {
  :root {
    --spacing-md: 20px;
    --spacing-lg: 28px;
  }
  .msg { padding: 13px 18px; }
  footer textarea { min-height: 48px; }
  footer button   { min-width: 48px; height: 48px; }
}

/* Desktop ≥ 900 px: columna centrada */
@media (min-width: 900px) {
  :root { --spacing-md: 24px; }

  header {
    padding-left: max(var(--spacing-lg), calc((100% - var(--chat-max)) / 2));
    padding-right: max(var(--spacing-lg), calc((100% - var(--chat-max)) / 2));
  }

  .msg { max-width: min(72%, 560px); }
}
</style>
</head>

<body>

<!-- ==================== HEADER / ENCABEZADO ==================== -->
<header>
  <h1>Mesa de Ayuda IA</h1>
  <div class="api-config">
    <input type="password" placeholder="API Key" id="api-key-input">
    <button id="connect-btn" onclick="saveApiKey()">Conectar</button>
  </div>
</header>

<!-- ==================== MAIN / BODY ==================== -->
<main id="chat-window">
  <div class="msg bot"><strong>Asistente:</strong> Hola, soy tu asistente de soporte. ¿En qué puedo ayudarte?</div>
  <div id="typing-indicator" class="typing-indicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</main>

<!-- ==================== FOOTER ==================== -->
<footer>
  <textarea id="user-input" placeholder="Escribe tu consulta aquí..." rows="1"></textarea>
  <button onclick="sendMessage()" title="Enviar">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</footer>

<script>
  /* -------------------------------------------------------
     Módulo 1 → Estado: variables globales (apiKey, conversationHistory)
  ------------------------------------------------------- */
  let apiKey = "";
  let conversationHistory = [];

  /* -------------------------------------------------------
     Módulo 2 → RAG: base de conocimiento
  ------------------------------------------------------- */
  let KNOWLEDGE_BASE = "";

  async function loadKnowledgeBase() {
    try {
      const response = await fetch('./catalogo.txt');
      if (!response.ok) throw new Error("No se pudo cargar el archivo catalogo.txt");
      
      KNOWLEDGE_BASE = await response.text();
      console.log("Módulo 2: Catálogo cargado con éxito.");
      
      // Una vez cargado el texto, inicializamos el prompt
      initializeSystemPrompt();
    } catch (error) {
      console.error("Error en Módulo 2:", error);
      addMessage('bot', "⚠️ Error: No se pudo cargar la base de conocimiento (catalogo.txt).");
    }
  }

  /* -------------------------------------------------------
     Módulo 3 → System Prompt: reglas del asistente
  ------------------------------------------------------- */
  let SYSTEM_PROMPT = "";

  function initializeSystemPrompt() {
    const NOMBRE_EMPRESA = "Nuestra Empresa"; // Puedes cambiar este valor
    
    SYSTEM_PROMPT = `Eres el asistente de ${NOMBRE_EMPRESA}.

REGLAS CRÍTICAS:
1. Responde ÚNICAMENTE usando la información del catálogo proporcionado.
2. Si la información no está en el catálogo, di: "Esa información no está disponible. Te recomiendo contactar directamente con ${NOMBRE_EMPRESA}."
3. Tono: profesional y conciso.
4. Nunca inventes datos que no estén en el catálogo.

BASE DE CONOCIMIENTO:
${KNOWLEDGE_BASE}`;
    
    console.log("Módulo 3: SYSTEM_PROMPT construido.");
  }

  // Ejecutar carga automática al iniciar la página
  window.addEventListener('DOMContentLoaded', loadKnowledgeBase);

  /* -------------------------------------------------------
     Módulo 4 → API Key: función saveApiKey()
  ------------------------------------------------------- */
  function saveApiKey() {
    const input = document.getElementById('api-key-input');
    const btn   = document.getElementById('connect-btn');
    const value = input.value.trim();

    if (!value.startsWith('sk-')) {
      alert('La API Key debe comenzar con "sk-". Verifica e intenta de nuevo.');
      return;
    }

    // Guardar solo en memoria — nunca viaja a un servidor propio
    apiKey = value;

    // Bloquear el campo y marcar como conectado
    input.disabled = true;
    btn.textContent = '✓ Conectado';
    btn.disabled = true;
    btn.classList.add('connected');
    btn.onclick = null;
  }

  /* -------------------------------------------------------
     Módulo 5 → Enviar mensaje: función sendMessage()
  ------------------------------------------------------- */
  async function sendMessage() {
    const textarea = document.getElementById('user-input');
    const text = textarea.value.trim();

    if (!text) return;

    if (!apiKey) {
      alert('Primero conecta tu API Key.');
      return;
    }

    // Limpiar textarea y restaurar altura
    textarea.value = '';
    autoResize(textarea);

    // Añadir turno del usuario al historial y al chat
    conversationHistory.push({ role: 'user', content: text });
    addMessage('user', text);

    showTyping(true);

    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          temperature: 0.3,
          max_tokens: 600,
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...conversationHistory
          ]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `Error HTTP ${response.status}`);
      }

      const data = await response.json();
      const assistantText = data.choices[0].message.content;

      // Añadir respuesta al historial y al chat
      conversationHistory.push({ role: 'assistant', content: assistantText });
      addMessage('bot', assistantText);

    } catch (error) {
      addMessage('bot', `⚠️ Error: ${escapeHtml(error.message)}`);
    } finally {
      showTyping(false);
    }
  }

  /* -------------------------------------------------------
     Módulo 6 → UI helpers: funciones de interfaz
  ------------------------------------------------------- */

  // Agrega una burbuja al chat (role: 'user' | 'bot')
  function addMessage(role, text) {
    const chatWindow = document.getElementById('chat-window');
    const typing     = document.getElementById('typing-indicator');

    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
    const label = role === 'user' ? 'Usuario' : 'Asistente';
    div.innerHTML = `<strong>${label}:</strong> ${escapeHtml(text)}`;

    // Insertar antes del indicador para que siempre quede al fondo
    chatWindow.insertBefore(div, typing);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // Muestra u oculta el indicador de escritura animado
  function showTyping(visible) {
    const indicator  = document.getElementById('typing-indicator');
    const chatWindow = document.getElementById('chat-window');
    indicator.classList.toggle('visible', visible);
    if (visible) chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // Auto-redimensiona el textarea según su contenido (máx. 120 px)
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // Enter → enviar; Shift+Enter → nueva línea
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Escapa caracteres HTML peligrosos antes de inyectar en el DOM
  function escapeHtml(text) {
    return String(text)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;')
      .replace(/'/g,  '&#39;')
      .replace(/\n/g, '<br>');
  }

  // Enlazar eventos al textarea
  const textarea = document.getElementById('user-input');
  if (textarea) {
    textarea.addEventListener('input',   () => autoResize(textarea));
    textarea.addEventListener('keydown', (e) => handleKey(e));
  }

  /* -------------------------------------------------------
     Fix teclado virtual en iOS/Android:
     cuando el teclado aparece, el viewport se encoge y el
     footer se queda flotando. Forzamos scroll al final.
  ------------------------------------------------------- */
  if ('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', () => {
      const chatWindow = document.getElementById('chat-window');
      chatWindow.scrollTop = chatWindow.scrollHeight;
    });
  }
</script>

</body>
</html>
